name: Python wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch: # manual trigger (publish without a new tag)

permissions:
  contents: read

jobs:
  wheels:
    name: wheel ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64 }
          - { os: ubuntu-latest,  target: aarch64 }
          - { os: macos-latest,   target: x86_64 }
          - { os: macos-latest,   target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      # Models are NOT bundled since models-v2: the full-lexicon models total
      # several hundred MB, past PyPI's per-file limit. The wheel is lean; the
      # runtime downloads a language's model from the models-v2 release on
      # first use and caches it (see g2p2.__init__ resolution order). Offline
      # installs: download the .g2p files once and point $G2P2_MODELS at them.
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: bindings/python/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: bindings/python/dist

  # Offline pack for `pip install g2p2[all]`: xz-compressed model data split
  # into chunk packages under PyPI's file cap, plus the g2p2-models meta.
  # NOTE: trusted publishing is per project name — PyPI needs pending
  # publishers registered for g2p2-models and g2p2-models-part1..3 (same
  # workflow file, environment `pypi`) before the first publish succeeds.
  model-packs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: fetch models
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p models
          gh release download models-v2 --repo "$GITHUB_REPOSITORY" \
            --dir models --pattern '*.g2p' --clobber
          echo "fetched $(ls models | wc -l) models"
      - name: build packs
        run: |
          VERSION=$(grep -m1 '^version' bindings/python/pyproject.toml | cut -d'"' -f2)
          python scripts/pack_models.py models packs "$VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: model-packs
          path: packs/dist

  publish:
    name: publish to PyPI
    needs: [wheels, sdist, model-packs]
    runs-on: ubuntu-latest
    environment: pypi           # matches the PyPI pending-publisher form
    permissions:
      id-token: write           # OIDC — trusted publishing, no token/secret
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # Split so a missing pending publisher for the pack names cannot block
      # the g2p2 wheels themselves.
      - name: sort artifacts
        run: |
          mkdir -p dist-core dist-packs
          mv dist/g2p2_models* dist-packs/ 2>/dev/null || true
          mv dist/* dist-core/ 2>/dev/null || true
      - name: publish g2p2
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-core
          skip-existing: true
      # Model data packages are published with a PyPI API token, not OIDC:
      # a *pending* trusted publisher must be unique per (owner, repo, workflow,
      # environment), so multiple data packages can't share one pending
      # publisher. A token creates all of them in one shot and sidesteps that.
      - name: publish model packs
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist-packs
          skip-existing: true
          attestations: false
