name: Python wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch: # manual trigger (publish without a new tag)

permissions:
  contents: read

jobs:
  wheels:
    name: wheel ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64 }
          - { os: ubuntu-latest,  target: aarch64 }
          - { os: macos-latest,   target: x86_64 }
          - { os: macos-latest,   target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      # Bundle all language models into the wheel (default install ships offline).
      - name: bundle models
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bindings/python/python/g2p2/models
          gh release download models-v1 --repo "$GITHUB_REPOSITORY" \
            --dir bindings/python/python/g2p2/models --pattern '*.g2p' --clobber
          echo "bundled $(ls bindings/python/python/g2p2/models | wc -l) models"
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: bindings/python/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: bindings/python/dist

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi           # matches the PyPI pending-publisher form
    permissions:
      id-token: write           # OIDC — trusted publishing, no token/secret
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
